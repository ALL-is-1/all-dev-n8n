app:
  name: all-dev-n8n
  version: "2.23.4"

# Sidecar mode.
#
# n8n runs its own snapd-managed daemon (the `n8n` Node process defined in
# snapcraft.yaml). The CT engine does NOT launch or manage it — it runs as a
# lightweight reporting sidecar that validates/persists the config Control Tower
# pushes via `snap set` and streams status callbacks back to CT.
run:
  command: ""

# Status reported on the initial and periodic callbacks. Reports the live URL,
# honouring the operator-configurable port (defaults to 5678).
sidecar:
  status_command: port=$(snapctl get port 2>/dev/null); hostname -I | awk -v p="$port" '{print "n8n: http://" $1 ":" (p==""?"5678":p)}'

output:
  mode: logs
  interval: 0
  initial_event: "message_initial"
  periodic_event: "message"
  stop_event: "deployment_stop"

# Configuration schema. `port` is the only operator-facing setting; the
# automatic ct-* keys are handled by the engine itself.
config:
  port:
    type: int
    default: 5678
    description: "HTTP port n8n listens on"
