name: all-dev-n8n
base: core24
version: '2.23.4'
summary: Secure, AI-native workflow automation for technical teams.
description: |
  n8n is a workflow automation platform that lets you connect anything to
  everything: 400+ integrations, native AI capabilities, and a fair-code
  license. Build flexible workflows with a visual editor and code when you
  need it (JavaScript/Python in the Code node).

  This snap is fully self-contained: it bundles Node.js 22 (n8n requires
  Node >=22.22) and installs the official n8n npm release. All state — the
  SQLite database, the credential-encryption key, binary data and logs —
  lives under the snap's common data dir (`$SNAP_COMMON/.n8n`); nothing is
  written outside the snap.

  n8n listens on 0.0.0.0:5678 by default. Change the port with:
    sudo snap set all-dev-n8n port=5679

  Open the editor at http://<host>:5678 and create the owner account on first
  run. (Auth cookies are served over plain HTTP for LAN use; put a TLS reverse
  proxy in front for remote access.)

grade: stable
confinement: strict
# xz compresses the (node_modules-heavy) snap ~2x better than lzo.
compression: xz

icon: snap/gui/icon.png

# n8n ships under the fair-code "Sustainable Use License" (source-available, not
# OSI/SPDX). snapcraft validates `license` as an SPDX expression, so use the
# accepted catch-all for non-OSS. See LICENSE upstream for the real terms.
license: Proprietary

website: https://n8n.io
source-code: https://github.com/n8n-io/n8n
issues: https://github.com/n8n-io/n8n/issues
contact: https://github.com/Half-Silver

# amd64 only: the bundled Node tarball and n8n's native deps (sqlite3 +
# @n8n/typeorm, plus isolated-vm/ssh2/etc. prebuilds) are wired for linux-x64.
platforms:
  amd64:

lint:
  ignore:
    - library

apps:
  n8n:
    command: bin/n8n-run
    daemon: simple
    install-mode: enable
    restart-condition: always
    plugs:
      - network          # outbound HTTP from workflow nodes
      - network-bind     # serve the editor/API/webhooks on 5678
      - home             # read/write files for the local-filesystem nodes
      - removable-media  # optional: workflows that touch external storage

  # Control Tower integration sidecar. Runs alongside n8n (it does not manage
  # it): validates/persists the config CT pushes via `snap set` and streams
  # status callbacks to ct-callback-url. Driven by ct-engine/plugin.yaml.
  ct-engine:
    command: bin/ct-engine-run run
    daemon: simple
    install-mode: enable
    restart-condition: always
    plugs:
      - network
      - network-bind

# CT Engine lifecycle hooks need network to send update/stop callbacks to
# Control Tower under strict confinement. (configure needs no network — it only
# persists config and restarts services via snapctl.)
hooks:
  pre-refresh:
    plugs: [network]
  post-refresh:
    plugs: [network]
  remove:
    plugs: [network]

parts:
  # ---- Bundled Node.js 22 runtime -----------------------------------------
  # core24 (Ubuntu 24.04) apt ships Node 18; n8n requires >=22.22.
  node:
    plugin: nil
    build-packages:
      - curl
      - ca-certificates
      - xz-utils
    override-build: |
      craftctl default
      NODE_VERSION="v22.22.3"
      URL="https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-linux-x64.tar.xz"
      echo "Downloading Node ${NODE_VERSION} ..."
      curl -fSL --retry 5 --retry-delay 5 --retry-all-errors -o /tmp/node.tar.xz "${URL}"
      mkdir -p "${CRAFT_PART_INSTALL}/usr/lib/node"
      tar -xJf /tmp/node.tar.xz -C "${CRAFT_PART_INSTALL}/usr/lib/node" --strip-components=1
      rm -f /tmp/node.tar.xz
      "${CRAFT_PART_INSTALL}/usr/lib/node/bin/node" --version

  # ---- n8n (official npm release) -----------------------------------------
  n8n:
    after:
      - node
    plugin: nil
    build-packages:
      - python3
      - build-essential   # node-gyp fallback for any dep without a prebuild
      - ca-certificates
    build-environment:
      - NODE_OPTIONS: '--max-old-space-size=4096'
    override-build: |
      craftctl default
      export PATH="${CRAFT_STAGE}/usr/lib/node/bin:${PATH}"
      # Harden npm against flaky-network ECONNRESET.
      npm config set fetch-retries 5
      npm config set fetch-retry-mintimeout 20000
      npm config set fetch-retry-maxtimeout 120000
      npm config set fetch-timeout 600000
      mkdir -p "${CRAFT_PART_INSTALL}/opt/n8n"
      # Global-style install into the snap: modules -> opt/n8n/lib/node_modules,
      # the `n8n` launcher -> opt/n8n/bin/n8n. --omit=dev keeps only runtime deps.
      npm install -g "n8n@${CRAFT_PROJECT_VERSION}" \
        --prefix "${CRAFT_PART_INSTALL}/opt/n8n" \
        --omit=dev --no-audit --no-fund
      # Trim caches/junk that bloat the snap.
      # WARNING: do NOT delete directories named test/tests/docs/.bin here.
      # Some runtime packages keep *published* code in such dirs — e.g. langchain
      # ships dist/agents/tests/utils.cjs, which langchain/dist/index.cjs require()s
      # at load time. Removing it makes start.js fail to import, surfaced (very
      # misleadingly) as: `Error: Command "start" not found` — because n8n 2.x's
      # CommandRegistry swallows the import error before reporting the command.
      find "${CRAFT_PART_INSTALL}/opt/n8n" -type d -name '__pycache__' -prune -exec rm -rf {} + 2>/dev/null || true
      find "${CRAFT_PART_INSTALL}/opt/n8n" -type f \( -name '*.md' -o -name '*.ts.map' -o -name '*.d.ts' \) -delete 2>/dev/null || true

  # ---- Launcher ------------------------------------------------------------
  wrappers:
    plugin: dump
    source: snap/local
    organize:
      n8n-run: bin/n8n-run

  # ---- Control Tower engine (sidecar) --------------------------------------
  ct-engine:
    plugin: dump
    source: ct-engine
    organize:
      ct_engine.py: bin/ct-engine
      ct-engine-run: bin/ct-engine-run
      plugin.yaml: plugin.yaml
    stage:
      - bin/ct-engine
      - bin/ct-engine-run
      - plugin.yaml

  # python3 for the ct-engine sidecar + CA certs (HTTPS callbacks and n8n's own
  # outbound TLS).
  ct-runtime:
    plugin: nil
    stage-packages:
      - ca-certificates
      - python3-minimal
    override-prime: |
      craftctl default
      # The ca-certificates postinst trigger (which concatenates the trusted
      # roots into etc/ssl/certs/ca-certificates.crt) does not run during snap
      # staging, so that bundle ships EMPTY. The launcher points
      # NODE_EXTRA_CA_CERTS at it, so node logs "Ignoring extra certs ... load
      # failed" on every start. Rebuild the bundle from the staged Mozilla roots.
      bundle="${CRAFT_PRIME}/etc/ssl/certs/ca-certificates.crt"
      srcdir="${CRAFT_PRIME}/usr/share/ca-certificates/mozilla"
      if [ -d "$srcdir" ] && ls "$srcdir"/*.crt >/dev/null 2>&1; then
        install -d "${CRAFT_PRIME}/etc/ssl/certs"
        cat "$srcdir"/*.crt > "$bundle"
        echo "Rebuilt CA bundle: $(grep -c 'BEGIN CERT' "$bundle") roots."
      else
        echo "WARNING: no Mozilla CA roots staged at $srcdir; CA bundle left as-is." >&2
      fi

# Made with Bob
